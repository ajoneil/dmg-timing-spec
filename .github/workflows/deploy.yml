name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enables Pages on the repo on the first run (needs the pages:write
      # permission granted above); no manual Settings step required.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # mdbook-admonish (<=1.20) does not support mdbook 0.5; pin the 0.4
      # toolchain and the matching preprocessor versions used to author the book.
      - name: Install mdBook toolchain
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.4.52,mdbook-admonish@1.20.0,mdbook-mermaid@0.15.0

      - name: Build
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
